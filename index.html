<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flip Clock</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500&display=swap" rel="stylesheet">


<style>

*{
box-sizing:border-box;
}


body{

margin:0;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:#F7F4EE;

font-family:Inter,sans-serif;

}


.clock-card{

width:260px;

padding:28px;

background:#FCFAF5;

border-radius:24px;

border:1px solid #D8D0C4;

text-align:center;

box-shadow:0 10px 30px rgba(0,0,0,.08);

}



.clock{

display:flex;

justify-content:center;

align-items:center;

gap:5px;

}


.flip{

width:45px;

height:58px;

background:#E8E1D5;

border-radius:9px;

display:flex;

justify-content:center;

align-items:center;

font-family:"DM Serif Display",serif;

font-size:36px;

color:#454540;

position:relative;

overflow:hidden;

}


.flip:after{

content:"";

position:absolute;

height:1px;

width:100%;

background:#CFC6B8;

top:50%;

}



.animate{

animation:flip .35s ease;

}



@keyframes flip{

0%{
transform:rotateX(0deg);
}

50%{
transform:rotateX(-90deg);
}

100%{
transform:rotateX(0deg);
}

}



.colon{

font-size:30px;

color:#93A68B;

}



.ampm{

margin-left:8px;

font-size:14px;

color:#7D9276;

font-weight:500;

}



.date{

margin-top:20px;

font-size:14px;

line-height:1.6;

color:#817B72;

}



.day{

font-weight:500;

color:#657565;

}



</style>


</head>


<body>


<div class="clock-card">


<div class="clock">


<div class="flip" id="h1">0</div>

<div class="flip" id="h2">0</div>


<div class="colon">:</div>


<div class="flip" id="m1">0</div>

<div class="flip" id="m2">0</div>


<div class="ampm" id="ampm"></div>


</div>



<div class="date">

<div class="day" id="day"></div>

<div id="fullDate"></div>

</div>



</div>



<script>


function updateClock(){


let now=new Date();


let hours=now.getHours();

let minutes=now.getMinutes();


let ampm=hours>=12 ? "PM":"AM";


hours=hours%12 || 12;



let time=

String(hours).padStart(2,"0")

+

String(minutes).padStart(2,"0");



let boxes=["h1","h2","m1","m2"];



boxes.forEach((box,index)=>{


let element=document.getElementById(box);


if(element.innerHTML!==time[index]){


element.classList.remove("animate");

void element.offsetWidth;

element.classList.add("animate");

element.innerHTML=time[index];


}


});



document.getElementById("ampm").innerHTML=ampm;



document.getElementById("day").innerHTML=

now.toLocaleDateString([],{

weekday:"long"

});



document.getElementById("fullDate").innerHTML=

now.toLocaleDateString([],{

month:"long",

day:"numeric",

year:"numeric"

});



}



updateClock();


setInterval(updateClock,1000);



</script>


</body>
</html>
